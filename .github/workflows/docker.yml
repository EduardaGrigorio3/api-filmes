name: docker-workflow

on:
  push:
    branches:
      - '**'

jobs:

  build-image:
    runs-on: ubuntu-latest

    steps:
      - name: Clonando repositório
        uses: actions/checkout@v4

      - name: Configurando Docker
        uses: docker/setup-buildx-action@v3

      - name: Construindo imagem
        run: docker build -t api-filmes .

  publish-image:
    runs-on: ubuntu-latest

    needs: build-image

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Clonando repositório
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build imagem final
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/api-filmes .

      - name: Publicando imagem
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-filmes