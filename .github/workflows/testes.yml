name: testes-workflow
run-name: ${{ github.actor }} executando testes

on: [push, pull_request]

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
      - name: Baixando código
        uses: actions/checkout@v4

      - name: Configurando Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalando dependências
        run: npm install

      - name: Rodando testes
        run: npm test